name: "Generate KRIA Zynq FPGA bitstream"

on:
  push:

jobs:
  build:
    runs-on: [ self-hosted, Linux, wsl ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.build_key }}

      - name: Clean workspace
        run: git clean -fdx

      - name: Generate bitstream
        run: |
          cd scripts
          make build

      - name: Generate device tree
        run: |
          cd scripts
          make devicetree

      - name: Generate error report
        if: always()
        run: |
          cd scripts
          make report